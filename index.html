<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vision HUD - MR Interface Futurista</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', 'Orbitron', sans-serif;
            overflow: hidden;
            background: #000;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* Background futurista animado (fallback quando câmera falha) */
        .animated-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0e1a 0%, #0f1422 25%, #0a0a1a 50%, #0d1225 75%, #0a0e1a 100%);
            z-index: 0;
        }

        .animated-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 191, 255, 0.03) 2px,
                rgba(0, 191, 255, 0.03) 4px
            );
            pointer-events: none;
        }

        .animated-bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 40%, rgba(0, 191, 255, 0.08) 0%, transparent 50%);
            animation: pulse 8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 191, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 191, 255, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            pointer-events: none;
        }

        #webcam {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            display: none;
        }

        .overlay-fx {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 60%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
            z-index: 2;
        }

        .hud-container {
            position: fixed;
            z-index: 10;
            width: 100%;
            height: 100%;
            pointer-events: none;
            top: 0;
            left: 0;
        }

        .glass-card, .bottom-dock, .top-right-menu, .right-slider-panel {
            pointer-events: auto;
        }

        /* Estilos dos componentes (mantidos da versão anterior) */
        .left-sidebar {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 16px;
            z-index: 20;
        }

        .glass-card {
            width: 75px;
            height: 85px;
            background: rgba(20, 30, 55, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 18px;
            border: 1px solid rgba(0, 191, 255, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: all 0.25s;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .glass-card:active {
            transform: scale(0.95);
        }

        .glass-card span:first-child {
            font-size: 26px;
            filter: drop-shadow(0 0 3px #00BFFF);
        }

        .glass-card .label {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #ccf4ff;
            text-transform: uppercase;
            font-family: 'Orbitron', monospace;
        }

        .value-indicator {
            font-size: 9px;
            font-family: 'Orbitron', monospace;
            color: #00BFFF;
            background: rgba(0,0,0,0.6);
            padding: 2px 6px;
            border-radius: 20px;
            margin-top: 2px;
        }

        .slider-horizontal {
            width: 60px;
            height: 3px;
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
            margin-top: 5px;
            position: relative;
            cursor: pointer;
        }
        
        .slider-fill {
            height: 3px;
            background: #00BFFF;
            border-radius: 4px;
            box-shadow: 0 0 4px cyan;
            width: 70%;
        }

        .top-right-menu {
            position: absolute;
            top: 16px;
            right: 16px;
            display: flex;
            gap: 15px;
            background: rgba(8, 16, 28, 0.5);
            backdrop-filter: blur(20px);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(0, 191, 255, 0.4);
            box-shadow: 0 0 12px rgba(0,191,255,0.2);
            z-index: 20;
        }

        .menu-icon, .vr-icon, .settings-icon {
            font-size: 22px;
            color: #eef5ff;
            transition: 0.2s;
            cursor: pointer;
        }

        .menu-icon:active, .vr-icon:active, .settings-icon:active {
            transform: scale(0.9);
        }

        .right-slider-panel {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 55px;
            background: rgba(15, 25, 45, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(0, 191, 255, 0.5);
            box-shadow: 0 0 20px rgba(0,191,255,0.2);
            z-index: 20;
        }

        .slider-label {
            color: #00BFFF;
            font-size: 11px;
            font-weight: bold;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            letter-spacing: 3px;
            font-family: 'Orbitron', monospace;
        }

        .vertical-slider {
            width: 5px;
            height: 150px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            position: relative;
            cursor: pointer;
        }

        .slider-thumb {
            width: 18px;
            height: 18px;
            background: #00BFFF;
            border-radius: 50%;
            position: absolute;
            left: 50%;
            transform: translate(-50%, -50%);
            top: 50%;
            box-shadow: 0 0 12px #00BFFF;
            cursor: grab;
        }

        .slider-value {
            font-size: 12px;
            font-weight: bold;
            color: #c0f2ff;
            background: rgba(0,0,0,0.6);
            padding: 4px 8px;
            border-radius: 20px;
            font-family: 'Orbitron';
        }

        .bottom-dock {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(12, 22, 38, 0.5);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            padding: 10px 20px;
            display: flex;
            gap: 20px;
            align-items: center;
            border: 1px solid rgba(0, 191, 255, 0.5);
            box-shadow: 0 0 25px rgba(0,191,255,0.3);
            z-index: 20;
        }

        .dock-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            padding: 6px 10px;
            border-radius: 40px;
        }

        .dock-item:active {
            transform: scale(0.9);
        }

        .dock-item span:first-child {
            font-size: 24px;
            color: #eef5ff;
        }

        .dock-label {
            font-size: 9px;
            font-family: 'Orbitron', monospace;
            color: #9bc7ff;
            margin-top: 3px;
        }

        .main-button {
            background: radial-gradient(circle at 30% 10%, #00BFFF, #0066aa);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255,255,255,0.6);
            box-shadow: 0 0 20px #00BFFF;
            transition: 0.2s;
            cursor: pointer;
        }

        .main-button:active {
            transform: scale(0.95);
        }

        .main-button span {
            font-size: 32px;
            color: white;
            filter: drop-shadow(0 0 4px black);
        }

        .file-input-hidden {
            display: none;
        }

        .status-badge {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            color: #00BFFF;
            padding: 8px 16px;
            border-radius: 20px;
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            z-index: 100;
            border: 1px solid #00BFFF;
            pointer-events: none;
            white-space: nowrap;
        }

        @media (max-width: 700px) {
            .glass-card { width: 65px; height: 75px; }
            .glass-card span:first-child { font-size: 22px; }
            .bottom-dock { gap: 12px; padding: 8px 16px; }
            .dock-item span:first-child { font-size: 20px; }
            .main-button { width: 50px; height: 50px; }
            .main-button span { font-size: 28px; }
            .top-right-menu { padding: 8px 16px; gap: 12px; }
            .right-slider-panel { width: 50px; }
            .status-badge { font-size: 9px; white-space: nowrap; bottom: 90px; }
        }
    </style>
</head>
<body>

    <div class="animated-bg"></div>
    <div class="grid-overlay"></div>
    <video id="webcam" autoplay playsinline muted></video>
    <div class="overlay-fx"></div>

    <div class="hud-container">
        <div class="left-sidebar">
            <div class="glass-card" id="volume-btn">
                <span>🔊</span>
                <span class="label">VOLUME</span>
                <div class="slider-horizontal" id="volume-slider">
                    <div class="slider-fill" id="volume-fill"></div>
                </div>
                <span class="value-indicator" id="volume-value">70%</span>
            </div>
            <div class="glass-card" id="zoom-btn">
                <span>🔍</span>
                <span class="label">ZOOM</span>
                <div class="slider-horizontal" id="zoom-slider">
                    <div class="slider-fill" id="zoom-fill"></div>
                </div>
                <span class="value-indicator" id="zoom-value">50%</span>
            </div>
            <div class="glass-card" id="trash-btn">
                <span>🗑️</span>
                <span class="label">LIXEIRA</span>
            </div>
            <div class="glass-card" id="open-file-btn">
                <span>📂</span>
                <span class="label">ABRIR ARQUIVO</span>
            </div>
        </div>

        <div class="top-right-menu">
            <div class="menu-icon" id="menu-icon">☰</div>
            <div class="vr-icon" id="vr-icon">🥽</div>
            <div class="settings-icon" id="settings-icon">⚙️</div>
        </div>

        <div class="right-slider-panel">
            <div class="slider-label">HOLO</div>
            <div class="vertical-slider" id="vertical-slider">
                <div class="slider-thumb" id="slider-thumb"></div>
            </div>
            <div class="slider-value" id="holo-value">0.50</div>
        </div>

        <div class="bottom-dock">
            <div class="dock-item" id="back-btn">
                <span>⏪</span>
                <span class="dock-label">VOLTAR</span>
            </div>
            <div class="dock-item" id="prev-btn">
                <span>◀</span>
                <span class="dock-label">ANTERIOR</span>
            </div>
            <div class="main-button" id="main-action-btn">
                <span>▶️</span>
            </div>
            <div class="dock-item" id="next-btn">
                <span>▶</span>
                <span class="dock-label">PRÓXIMO</span>
            </div>
            <div class="dock-item" id="refresh-btn">
                <span>🔄</span>
                <span class="dock-label">ATUALIZAR</span>
            </div>
        </div>
    </div>

    <div id="status-badge" class="status-badge">🌀 HUD ATIVO</div>

    <input type="file" id="file-input" accept="image/*,video/*,audio/*" class="file-input-hidden" multiple>

    <script>
        // Variáveis globais
        let currentVolume = 0.7;
        let currentZoom = 0.5;
        let mediaElements = [];
        let cameraActive = false;
        
        // Elementos DOM
        const volumeFill = document.getElementById('volume-fill');
        const volumeValue = document.getElementById('volume-value');
        const zoomFill = document.getElementById('zoom-fill');
        const zoomValue = document.getElementById('zoom-value');
        const statusBadge = document.getElementById('status-badge');
        const videoElement = document.getElementById('webcam');
        
        // Funções de UI
        function updateVolumeUI() {
            let percent = Math.round(currentVolume * 100);
            volumeFill.style.width = `${percent}%`;
            volumeValue.innerText = `${percent}%`;
            document.querySelectorAll('video:not(#webcam)').forEach(vid => { if(vid) vid.volume = currentVolume; });
        }
        
        function updateZoomUI() {
            let percent = Math.round(currentZoom * 100);
            zoomFill.style.width = `${percent}%`;
            zoomValue.innerText = `${percent}%`;
            if (cameraActive && videoElement.srcObject) {
                videoElement.style.transform = `scale(${0.8 + currentZoom * 0.6})`;
            }
        }
        
        // Controles de slider
        function setupSliders() {
            const volumeCard = document.getElementById('volume-btn');
            const zoomCard = document.getElementById('zoom-btn');
            
            function attachSlider(card, type) {
                const sliderDiv = card.querySelector('.slider-horizontal');
                let isDragging = false;
                
                const updateValue = (clientX) => {
                    const rect = card.getBoundingClientRect();
                    let relativeX = Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
                    if (type === 'volume') {
                        currentVolume = relativeX;
                        updateVolumeUI();
                        document.querySelectorAll('video:not(#webcam)').forEach(v => { if(v) v.volume = currentVolume; });
                    } else {
                        currentZoom = relativeX;
                        updateZoomUI();
                    }
                };
                
                const onMove = (e) => {
                    if (!isDragging) return;
                    e.preventDefault();
                    const clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
                    updateValue(clientX);
                };
                
                const onStart = (e) => {
                    isDragging = true;
                    e.preventDefault();
                    const clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
                    updateValue(clientX);
                    window.addEventListener('mousemove', onMove);
                    window.addEventListener('mouseup', onStop);
                    window.addEventListener('touchmove', onMove);
                    window.addEventListener('touchend', onStop);
                };
                
                const onStop = () => {
                    isDragging = false;
                    window.removeEventListener('mousemove', onMove);
                    window.removeEventListener('mouseup', onStop);
                    window.removeEventListener('touchmove', onMove);
                    window.removeEventListener('touchend', onStop);
                };
                
                sliderDiv.addEventListener('mousedown', onStart);
                sliderDiv.addEventListener('touchstart', onStart);
            }
            
            attachSlider(volumeCard, 'volume');
            attachSlider(zoomCard, 'zoom');
        }
        
        // Slider vertical
        let verticalValue = 0.5;
        function updateVerticalSlider(value) {
            verticalValue = Math.min(1, Math.max(0, value));
            const container = document.getElementById('vertical-slider');
            const thumb = document.getElementById('slider-thumb');
            const containerHeight = container.clientHeight;
            const thumbTop = (1 - verticalValue) * containerHeight;
            thumb.style.top = `${thumbTop}px`;
            document.getElementById('holo-value').innerText = verticalValue.toFixed(2);
            // Efeito visual no HUD
            document.querySelector('.hud-container').style.opacity = 0.7 + verticalValue * 0.3;
        }
        
        function initVerticalSlider() {
            updateVerticalSlider(0.5);
            const slider = document.getElementById('vertical-slider');
            const thumb = document.getElementById('slider-thumb');
            let isDragging = false;
            
            const updateFromY = (clientY) => {
                const rect = slider.getBoundingClientRect();
                let yNorm = Math.min(1, Math.max(0, (clientY - rect.top) / rect.height));
                updateVerticalSlider(1 - yNorm);
            };
            
            const onMove = (e) => {
                if (!isDragging) return;
                e.preventDefault();
                const clientY = e.clientY ?? (e.touches ? e.touches[0].clientY : 0);
                updateFromY(clientY);
            };
            
            const onStart = (e) => {
                isDragging = true;
                e.preventDefault();
                const clientY = e.clientY ?? (e.touches ? e.touches[0].clientY : 0);
                updateFromY(clientY);
                window.addEventListener('mousemove', onMove);
                window.addEventListener('mouseup', onStop);
                window.addEventListener('touchmove', onMove);
                window.addEventListener('touchend', onStop);
            };
            
            thumb.addEventListener('mousedown', onStart);
            thumb.addEventListener('touchstart', onStart);
            slider.addEventListener('click', (e) => {
                const rect = slider.getBoundingClientRect();
                let clientY = e.clientY;
                let yNorm = Math.min(1, Math.max(0, (clientY - rect.top) / rect.height));
                updateVerticalSlider(1 - yNorm);
            });
            
            const onStop = () => {
                isDragging = false;
                window.removeEventListener('mousemove', onMove);
                window.removeEventListener('mouseup', onStop);
                window.removeEventListener('touchmove', onMove);
                window.removeEventListener('touchend', onStop);
            };
        }
        
        // Gerenciamento de mídia
        function handleMediaFile(file) {
            const url = URL.createObjectURL(file);
            if(file.type.startsWith('image/')) {
                const img = new Image();
                img.src = url;
                img.style.position = 'fixed';
                img.style.bottom = '80px';
                img.style.right = '16px';
                img.style.maxWidth = '250px';
                img.style.borderRadius = '12px';
                img.style.border = '2px solid #00BFFF';
                img.style.boxShadow = '0 0 18px cyan';
                img.style.zIndex = '15';
                document.body.appendChild(img);
                mediaElements.push(img);
                statusBadge.innerText = '✅ IMAGEM CARREGADA';
                setTimeout(() => { if(statusBadge) statusBadge.innerText = '🌀 HUD ATIVO'; }, 2000);
            } else if(file.type.startsWith('video/')) {
                const video = document.createElement('video');
                video.src = url;
                video.controls = true;
                video.style.position = 'fixed';
                video.style.bottom = '80px';
                video.style.right = '16px';
                video.style.maxWidth = '280px';
                video.style.border = '2px solid #0af';
                video.style.borderRadius = '16px';
                video.style.zIndex = '15';
                video.volume = currentVolume;
                document.body.appendChild(video);
                mediaElements.push(video);
                statusBadge.innerText = '🎬 VÍDEO CARREGADO';
                setTimeout(() => { if(statusBadge) statusBadge.innerText = '🌀 HUD ATIVO'; }, 2000);
            }
        }
        
        // Eventos dos botões
        document.getElementById('trash-btn').addEventListener('click', () => {
            mediaElements.forEach(el => { if(el && el.parentNode) el.remove(); });
            mediaElements = [];
            statusBadge.innerText = '🗑️ MÍDIAS REMOVIDAS';
            setTimeout(() => { if(statusBadge) statusBadge.innerText = '🌀 HUD ATIVO'; }, 2000);
        });
        
        document.getElementById('open-file-btn').addEventListener('click', () => document.getElementById('file-input').click());
        document.getElementById('file-input').addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => handleMediaFile(file));
            e.target.value = '';
        });
        
        document.getElementById('main-action-btn').addEventListener('click', () => {
            let activeVideo = mediaElements.find(m => m.tagName === 'VIDEO' && m.paused !== undefined);
            if(activeVideo) { 
                activeVideo.paused ? activeVideo.play() : activeVideo.pause();
                statusBadge.innerText = activeVideo.paused ? '⏸️ PAUSADO' : '▶️ REPRODUZINDO';
                setTimeout(() => { if(statusBadge) statusBadge.innerText = '🌀 HUD ATIVO'; }, 1500);
            } else {
                statusBadge.innerText = '📁 NENHUM VÍDEO ATIVO';
                setTimeout(() => { if(statusBadge) statusBadge.innerText = '🌀 HUD ATIVO'; }, 1500);
            }
        });
        
        document.getElementById('refresh-btn').addEventListener('click', () => location.reload());
        document.getElementById('menu-icon').addEventListener('click', () => alert('🔮 MENU FUTURISTA\n\n- Visão Holográfica\n- Modo Imersivo\n- Configurações Avançadas'));
        document.getElementById('vr-icon').addEventListener('click', () => alert('🥽 MODO VR\n\nAtive seus óculos de realidade virtual para uma experiência completa.'));
        document.getElementById('settings-icon').addEventListener('click', () => alert('⚙️ CONFIGURAÇÕES\n\nBrilho: 85%\nContraste: Auto\nEfeitos: Holográfico'));
        document.getElementById('back-btn').addEventListener('click', () => console.log("Voltar"));
        document.getElementById('prev-btn').addEventListener('click', () => console.log("Anterior"));
        document.getElementById('next-btn').addEventListener('click', () => console.log("Próximo"));
        
        // Tentativa de acesso à câmera (silenciosa, sem erro visível)
        async function tryInitCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: { exact: 'environment' } },
                    audio: false 
                });
                videoElement.srcObject = stream;
                videoElement.style.display = 'block';
                cameraActive = true;
                statusBadge.innerText = '📷 CÂMERA ATIVA';
                setTimeout(() => { if(statusBadge) statusBadge.innerText = '🌀 HUD ATIVO'; }, 2000);
            } catch (err) {
                console.log('Câmera não disponível:', err.message);
                videoElement.style.display = 'none';
                cameraActive = false;
                statusBadge.innerText = '🎨 MODO DEMO ATIVO';
                setTimeout(() => { if(statusBadge) statusBadge.innerText = '🌀 HUD ATIVO'; }, 3000);
            }
        }
        
        // Drag and drop
        window.addEventListener('dragover', (e) => { e.preventDefault(); });
        window.addEventListener('drop', (e) => {
            e.preventDefault();
            const files = Array.from(e.dataTransfer.files);
            files.forEach(f => handleMediaFile(f));
        });
        
        // Inicialização
        updateVolumeUI();
        updateZoomUI();
        setupSliders();
        initVerticalSlider();
        tryInitCamera();
        
        // Atualizar status badge periodicamente (apenas para manter)
        setInterval(() => {
            if (statusBadge.innerText === '🌀 HUD ATIVO') return;
            // reset após 3 segundos se não for mensagem permanente
            if (!statusBadge.innerText.includes('HUD')) {
                setTimeout(() => { if(statusBadge) statusBadge.innerText = '🌀 HUD ATIVO'; }, 2000);
            }
        }, 5000);
    </script>
</body>
</html>
