<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vision HUD - MR Interface Futurista</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', 'Orbitron', sans-serif;
            overflow: hidden;
            background: #000;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0;
            left: 0;
        }

        #webcam {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            transform: scaleX(-1);
        }

        #webcam-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            display: none;
        }

        .overlay-fx {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 60%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
            z-index: 2;
        }

        .hud-container {
            position: fixed;
            z-index: 10;
            width: 100%;
            height: 100%;
            pointer-events: none;
            top: 0;
            left: 0;
        }

        .glass-panel, .side-panel, .bottom-dock, .top-right-menu, .vertical-slider, .action-btn, .file-trigger, .trash-btn, .zoom-control, .volume-control {
            pointer-events: auto;
        }

        .glass-panel {
            background: rgba(12, 20, 35, 0.3);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 191, 255, 0.35);
            border-radius: 20px;
            box-shadow: 0 0 15px rgba(0, 191, 255, 0.2), inset 0 0 10px rgba(0, 191, 255, 0.1);
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .glass-panel:hover {
            border-color: rgba(0, 191, 255, 0.8);
            box-shadow: 0 0 22px rgba(0, 191, 255, 0.5);
            transform: scale(1.02);
        }

        .action-btn, .file-trigger, .trash-btn, .zoom-btn, .volume-btn, .menu-btn, .vr-btn, .settings-btn, .dock-item {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
        }

        .action-btn:active, .file-trigger:active, .trash-btn:active, .dock-item:active {
            transform: scale(0.95);
        }

        .left-sidebar {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 16px;
            z-index: 20;
        }

        .glass-card {
            width: 75px;
            height: 85px;
            background: rgba(20, 30, 55, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 18px;
            border: 1px solid rgba(0, 191, 255, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: all 0.25s;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .glass-card span:first-child {
            font-size: 26px;
            filter: drop-shadow(0 0 3px #00BFFF);
        }

        .glass-card .label {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #ccf4ff;
            text-transform: uppercase;
            font-family: 'Orbitron', monospace;
        }

        .value-indicator {
            font-size: 9px;
            font-family: 'Orbitron', monospace;
            color: #00BFFF;
            background: rgba(0,0,0,0.6);
            padding: 2px 6px;
            border-radius: 20px;
            margin-top: 2px;
        }

        .top-right-menu {
            position: absolute;
            top: 16px;
            right: 16px;
            display: flex;
            gap: 15px;
            background: rgba(8, 16, 28, 0.5);
            backdrop-filter: blur(20px);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(0, 191, 255, 0.4);
            box-shadow: 0 0 12px rgba(0,191,255,0.2);
            z-index: 20;
        }

        .menu-icon, .vr-icon, .settings-icon {
            font-size: 22px;
            color: #eef5ff;
            transition: 0.2s;
            cursor: pointer;
        }

        .right-slider-panel {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 55px;
            background: rgba(15, 25, 45, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(0, 191, 255, 0.5);
            box-shadow: 0 0 20px rgba(0,191,255,0.2);
            z-index: 20;
        }

        .slider-label {
            color: #00BFFF;
            font-size: 11px;
            font-weight: bold;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            letter-spacing: 3px;
            font-family: 'Orbitron', monospace;
        }

        .vertical-slider {
            width: 5px;
            height: 150px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            position: relative;
            cursor: pointer;
        }

        .slider-thumb {
            width: 18px;
            height: 18px;
            background: #00BFFF;
            border-radius: 50%;
            position: absolute;
            left: 50%;
            transform: translate(-50%, -50%);
            top: 50%;
            box-shadow: 0 0 12px #00BFFF;
            transition: top 0.05s linear;
            cursor: grab;
        }

        .slider-value {
            font-size: 12px;
            font-weight: bold;
            color: #c0f2ff;
            background: rgba(0,0,0,0.6);
            padding: 4px 8px;
            border-radius: 20px;
            font-family: 'Orbitron';
        }

        .bottom-dock {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(12, 22, 38, 0.5);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            padding: 10px 20px;
            display: flex;
            gap: 20px;
            align-items: center;
            border: 1px solid rgba(0, 191, 255, 0.5);
            box-shadow: 0 0 25px rgba(0,191,255,0.3);
            z-index: 20;
        }

        .dock-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            padding: 6px 10px;
            border-radius: 40px;
        }

        .dock-item span:first-child {
            font-size: 24px;
            color: #eef5ff;
        }

        .dock-label {
            font-size: 9px;
            font-family: 'Orbitron', monospace;
            color: #9bc7ff;
            margin-top: 3px;
        }

        .main-button {
            background: radial-gradient(circle at 30% 10%, #00BFFF, #0066aa);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255,255,255,0.6);
            box-shadow: 0 0 20px #00BFFF;
            transition: 0.2s;
            cursor: pointer;
        }

        .main-button span {
            font-size: 32px;
            color: white;
            filter: drop-shadow(0 0 4px black);
        }

        .main-button:active {
            transform: scale(0.95);
        }

        .slider-horizontal {
            width: 60px;
            height: 3px;
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
            margin-top: 5px;
            position: relative;
        }
        
        .slider-fill {
            height: 3px;
            background: #00BFFF;
            border-radius: 4px;
            box-shadow: 0 0 4px cyan;
        }

        .file-input-hidden {
            display: none;
        }

        .hand-hover {
            filter: drop-shadow(0 0 12px #00ffff);
            border-color: cyan !important;
        }

        .camera-error {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #ff4444;
            padding: 12px 20px;
            border-radius: 12px;
            font-family: 'Orbitron', monospace;
            font-size: 12px;
            z-index: 100;
            text-align: center;
            border: 1px solid #ff4444;
            pointer-events: none;
        }

        @media (max-width: 700px) {
            .glass-card { width: 65px; height: 75px; }
            .glass-card span:first-child { font-size: 22px; }
            .bottom-dock { gap: 12px; padding: 8px 16px; }
            .dock-item span:first-child { font-size: 20px; }
            .main-button { width: 50px; height: 50px; }
            .main-button span { font-size: 28px; }
            .top-right-menu { padding: 8px 16px; gap: 12px; }
            .right-slider-panel { width: 50px; }
        }
    </style>
</head>
<body>

    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="webcam-canvas"></canvas>
    <div class="overlay-fx"></div>

    <div class="hud-container">
        <div class="left-sidebar">
            <div class="glass-card" id="volume-btn">
                <span>🔊</span>
                <span class="label">VOLUME</span>
                <div class="slider-horizontal" id="volume-slider-bg">
                    <div class="slider-fill" id="volume-fill" style="width: 70%;"></div>
                </div>
                <span class="value-indicator" id="volume-value">70%</span>
            </div>
            <div class="glass-card" id="zoom-btn">
                <span>🔍</span>
                <span class="label">ZOOM</span>
                <div class="slider-horizontal" id="zoom-slider-bg">
                    <div class="slider-fill" id="zoom-fill" style="width: 50%;"></div>
                </div>
                <span class="value-indicator" id="zoom-value">50%</span>
            </div>
            <div class="glass-card trash-btn" id="trash-btn">
                <span>🗑️</span>
                <span class="label">LIXEIRA</span>
            </div>
            <div class="glass-card file-trigger" id="open-file-btn">
                <span>📂</span>
                <span class="label">ABRIR ARQUIVO</span>
            </div>
        </div>

        <div class="top-right-menu">
            <div class="menu-icon action-btn" id="menu-icon">☰</div>
            <div class="vr-icon action-btn" id="vr-icon">🥽</div>
            <div class="settings-icon action-btn" id="settings-icon">⚙️</div>
        </div>

        <div class="right-slider-panel">
            <div class="slider-label">HOLO</div>
            <div class="vertical-slider" id="vertical-slider">
                <div class="slider-thumb" id="slider-thumb"></div>
            </div>
            <div class="slider-value" id="holo-value">0.50</div>
        </div>

        <div class="bottom-dock">
            <div class="dock-item" id="back-btn">
                <span>⏪</span>
                <span class="dock-label">VOLTAR</span>
            </div>
            <div class="dock-item" id="prev-btn">
                <span>◀</span>
                <span class="dock-label">ANTERIOR</span>
            </div>
            <div class="main-button" id="main-action-btn">
                <span>▶️</span>
            </div>
            <div class="dock-item" id="next-btn">
                <span>▶</span>
                <span class="dock-label">PRÓXIMO</span>
            </div>
            <div class="dock-item" id="refresh-btn">
                <span>🔄</span>
                <span class="dock-label">ATUALIZAR</span>
            </div>
        </div>
    </div>

    <input type="file" id="file-input" accept="image/*,video/*,audio/*" class="file-input-hidden" multiple>

    <script>
        // Elementos da UI
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('webcam-canvas');
        let currentVolume = 0.7;
        let currentZoom = 0.5;
        let mediaElements = [];
        
        const volumeFill = document.getElementById('volume-fill');
        const volumeValueSpan = document.getElementById('volume-value');
        const zoomFill = document.getElementById('zoom-fill');
        const zoomValueSpan = document.getElementById('zoom-value');
        const trashBtn = document.getElementById('trash-btn');
        const openFileBtn = document.getElementById('open-file-btn');
        const fileInput = document.getElementById('file-input');
        const verticalSliderDiv = document.getElementById('vertical-slider');
        const sliderThumb = document.getElementById('slider-thumb');
        const holoValueSpan = document.getElementById('holo-value');
        
        function updateVolumeUI() {
            let percent = Math.round(currentVolume * 100);
            volumeFill.style.width = `${percent}%`;
            volumeValueSpan.innerText = `${percent}%`;
            document.querySelectorAll('video').forEach(vid => { if(vid && vid !== videoElement) vid.volume = currentVolume; });
        }
        
        function updateZoomUI() {
            let percent = Math.round(currentZoom * 100);
            zoomFill.style.width = `${percent}%`;
            zoomValueSpan.innerText = `${percent}%`;
            videoElement.style.transform = `scale(${0.8 + currentZoom * 0.6})`;
        }
        
        function setupControls() {
            const volumeCard = document.getElementById('volume-btn');
            const zoomCard = document.getElementById('zoom-btn');
            
            function handleSliderDrag(event, type) {
                event.preventDefault();
                const rect = (type === 'volume') ? volumeCard.getBoundingClientRect() : zoomCard.getBoundingClientRect();
                const onMove = (moveEvent) => {
                    let clientX = moveEvent.clientX ?? (moveEvent.touches ? moveEvent.touches[0].clientX : 0);
                    let relativeX = Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
                    if(type === 'volume') {
                        currentVolume = relativeX;
                        updateVolumeUI();
                        document.querySelectorAll('video').forEach(v => { if(v && v !== videoElement) v.volume = currentVolume; });
                    } else {
                        currentZoom = relativeX;
                        updateZoomUI();
                    }
                };
                const onUp = () => {
                    window.removeEventListener('mousemove', onMove);
                    window.removeEventListener('mouseup', onUp);
                    window.removeEventListener('touchmove', onMove);
                    window.removeEventListener('touchend', onUp);
                };
                window.addEventListener('mousemove', onMove);
                window.addEventListener('mouseup', onUp);
                window.addEventListener('touchmove', onMove);
                window.addEventListener('touchend', onUp);
            }
            
            volumeCard.addEventListener('mousedown', (e) => handleSliderDrag(e, 'volume'));
            volumeCard.addEventListener('touchstart', (e) => handleSliderDrag(e, 'volume'));
            zoomCard.addEventListener('mousedown', (e) => handleSliderDrag(e, 'zoom'));
            zoomCard.addEventListener('touchstart', (e) => handleSliderDrag(e, 'zoom'));
        }
        
        let verticalValue = 0.5;
        function updateVerticalSlider(value) {
            verticalValue = Math.min(1, Math.max(0, value));
            let containerHeight = verticalSliderDiv.clientHeight;
            let thumbTop = (1 - verticalValue) * containerHeight;
            sliderThumb.style.top = `${thumbTop}px`;
            holoValueSpan.innerText = verticalValue.toFixed(2);
            document.querySelector('.hud-container').style.filter = `brightness(${0.8 + verticalValue * 0.4})`;
        }
        
        function initVerticalSlider() {
            updateVerticalSlider(0.5);
            const onDrag = (e) => {
                e.preventDefault();
                const rect = verticalSliderDiv.getBoundingClientRect();
                let clientY = e.clientY ?? (e.touches ? e.touches[0].clientY : 0);
                let yNorm = Math.min(1, Math.max(0, (clientY - rect.top) / rect.height));
                updateVerticalSlider(1 - yNorm);
            };
            sliderThumb.addEventListener('mousedown', (e) => { e.preventDefault(); window.addEventListener('mousemove', onDrag); window.addEventListener('mouseup', () => window.removeEventListener('mousemove', onDrag)); });
            sliderThumb.addEventListener('touchstart', (e) => { e.preventDefault(); window.addEventListener('touchmove', onDrag); window.addEventListener('touchend', () => window.removeEventListener('touchmove', onDrag)); });
            verticalSliderDiv.addEventListener('click', (e) => { const rect = verticalSliderDiv.getBoundingClientRect(); let clientY = e.clientY; let yNorm = Math.min(1, Math.max(0, (clientY - rect.top) / rect.height)); updateVerticalSlider(1 - yNorm); });
        }
        
        trashBtn.addEventListener('click', () => {
            mediaElements.forEach(el => { if(el.parentNode) el.remove(); });
            mediaElements = [];
        });
        
        openFileBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => handleMediaFile(file));
            fileInput.value = '';
        });
        
        function handleMediaFile(file) {
            const url = URL.createObjectURL(file);
            if(file.type.startsWith('image/')) {
                const img = new Image();
                img.src = url;
                img.style.position = 'fixed';
                img.style.bottom = '80px';
                img.style.right = '16px';
                img.style.maxWidth = '250px';
                img.style.borderRadius = '12px';
                img.style.border = '2px solid #00BFFF';
                img.style.boxShadow = '0 0 18px cyan';
                img.style.zIndex = '15';
                document.body.appendChild(img);
                mediaElements.push(img);
            } else if(file.type.startsWith('video/')) {
                const video = document.createElement('video');
                video.src = url;
                video.controls = true;
                video.style.position = 'fixed';
                video.style.bottom = '80px';
                video.style.right = '16px';
                video.style.maxWidth = '280px';
                video.style.border = '2px solid #0af';
                video.style.borderRadius = '16px';
                video.style.zIndex = '15';
                video.volume = currentVolume;
                document.body.appendChild(video);
                mediaElements.push(video);
            }
        }
        
        window.addEventListener('dragover', (e) => { e.preventDefault(); });
        window.addEventListener('drop', (e) => {
            e.preventDefault();
            const files = Array.from(e.dataTransfer.files);
            files.forEach(f => handleMediaFile(f));
        });
        
        // Inicialização da câmera com tratamento de erro melhorado
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' },
                    audio: false 
                });
                videoElement.srcObject = stream;
                videoElement.style.display = 'block';
                canvasElement.style.display = 'none';
                
                // Inicializar MediaPipe após a câmera estar rodando
                await initMediaPipe();
                
            } catch (err) {
                console.error('Erro ao acessar câmera:', err);
                const errorDiv = document.createElement('div');
                errorDiv.className = 'camera-error';
                errorDiv.innerHTML = '📷 Não foi possível acessar a câmera.<br>Verifique as permissões no seu navegador.';
                document.body.appendChild(errorDiv);
                setTimeout(() => errorDiv.remove(), 5000);
                
                // Fallback: imagem de placeholder
                videoElement.style.display = 'none';
                canvasElement.style.display = 'block';
                canvasElement.style.filter = 'brightness(0.3)';
                const ctx = canvasElement.getContext('2d');
                canvasElement.width = window.innerWidth;
                canvasElement.height = window.innerHeight;
                ctx.fillStyle = '#0a0a2a';
                ctx.fillRect(0, 0, canvasElement.width, canvasElement.height);
                ctx.fillStyle = '#00BFFF';
                ctx.font = '20px Orbitron';
                ctx.textAlign = 'center';
                ctx.fillText('📷 CÂMERA NÃO DISPONÍVEL', canvasElement.width/2, canvasElement.height/2);
                ctx.font = '14px Inter';
                ctx.fillText('Verifique as permissões do navegador', canvasElement.width/2, canvasElement.height/2 + 40);
            }
        }
        
        async function initMediaPipe() {
            if (!videoElement.srcObject) return;
            
            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });
            
            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });
            
            hands.onResults((results) => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const landmarks = results.multiHandLandmarks[0];
                    const thumbTip = landmarks[4];
                    const indexTip = landmarks[8];
                    const distance = Math.hypot(thumbTip.x - indexTip.x, thumbTip.y - indexTip.y);
                    
                    if (distance < 0.05) {
                        document.getElementById('main-action-btn').click();
                    }
                    
                    // Detectar hover nos botões
                    const handX = thumbTip.x * window.innerWidth;
                    const handY = thumbTip.y * window.innerHeight;
                    const elements = document.querySelectorAll('.glass-card, .dock-item, .main-button, .menu-icon, .vr-icon, .settings-icon');
                    
                    elements.forEach(el => {
                        const rect = el.getBoundingClientRect();
                        if (handX >= rect.left && handX <= rect.right && handY >= rect.top && handY <= rect.bottom) {
                            el.classList.add('hand-hover');
                        } else {
                            el.classList.remove('hand-hover');
                        }
                    });
                }
            });
            
            const camera = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({ image: videoElement });
                },
                width: 1280,
                height: 720
            });
            camera.start();
        }
        
        // Eventos dos botões
        document.getElementById('main-action-btn').addEventListener('click', () => {
            let activeVideo = mediaElements.find(m => m.tagName === 'VIDEO');
            if(activeVideo) { activeVideo.paused ? activeVideo.play() : activeVideo.pause(); }
        });
        document.getElementById('back-btn').addEventListener('click', () => console.log("Voltar"));
        document.getElementById('prev-btn').addEventListener('click', () => console.log("Anterior"));
        document.getElementById('next-btn').addEventListener('click', () => console.log("Próximo"));
        document.getElementById('refresh-btn').addEventListener('click', () => location.reload());
        document.getElementById('menu-icon').addEventListener('click', () => alert("Menu Futurista"));
        document.getElementById('vr-icon').addEventListener('click', () => alert("Modo VR"));
        document.getElementById('settings-icon').addEventListener('click', () => alert("Configurações"));
        
        function resizeCanvas() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
            if (canvasElement.style.display !== 'none') {
                const ctx = canvasElement.getContext('2d');
                ctx.fillStyle = '#0a0a2a';
                ctx.fillRect(0, 0, canvasElement.width, canvasElement.height);
            }
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        updateVolumeUI();
        updateZoomUI();
        setupControls();
        initVerticalSlider();
        initCamera();
    </script>
</body>
</html>
