<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MR Spatial Suite - Holographic HUD v2</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="hud-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>

        <div class="reticle">
            <div class="reticle-core"></div>
        </div>

        <header class="panel-top glass-card">
            <div id="status">CONECTADO</div>
            <div class="divider"></div>
            <button class="hud-btn" id="btn-menu">☰</button>
            <button class="hud-btn" id="btn-vr">🥽</button>
            <button class="hud-btn" id="btn-dots">⋮</button>
        </header>

        <aside class="panel-left">
            <div class="hud-card glass-card" id="card-volume">
                <div class="card-header">VOLUME</div>
                <div class="slider-container-horizontal">
                    <span class="step-icon">🔈</span>
                    <div class="hud-track"><div class="hud-bar" id="vol-bar" style="width: 50%;"></div></div>
                    <span class="step-icon">🔊</span>
                </div>
            </div>

            <div class="hud-card glass-card" id="card-zoom">
                <div class="card-header">ZOOM</div>
                <div class="hud-display" id="zoom-txt">100%</div>
                <div class="slider-container-horizontal">
                    <span class="step-icon">−</span>
                    <div class="hud-track"><div class="hud-bar" id="zoom-bar" style="width: 50%;"></div></div>
                    <span class="step-icon">+</span>
                </div>
            </div>

            <div class="hud-card glass-card trigger-btn" id="card-trash">
                <div class="trash-icon">🗑️</div>
                <div class="card-label">LIXEIRA</div>
            </div>

            <div class="hud-card glass-card trigger-btn" id="card-upload">
                <div class="upload-icon">📂</div>
                <div class="card-label">ABRIR ARQUIVO</div>
            </div>
        </aside>

        <aside class="panel-right glass-card" id="panel-slider-vertical">
            <button class="hud-btn-sm" id="v-up">＋</button>
            <div class="hud-track-vertical">
                <div class="hud-bar-vertical" id="v-bar-fill" style="height: 50%;"></div>
            </div>
            <button class="hud-btn-sm" id="v-down">－</button>
        </aside>

        <footer class="panel-bottom glass-card">
            <button class="hud-btn-round" id="nav-back">↩</button>
            <button class="hud-btn-round" id="nav-prev">⏮</button>
            <button class="hud-btn-main" id="media-play">
                <div class="main-core"></div>
            </button>
            <button class="hud-btn-round" id="nav-next">⏭</button>
            <button class="hud-btn-round" id="nav-refresh">↻</button>
        </footer>
    </div>

    <input type="file" id="file_input" accept="image/*,video/*">
    <img id="hidden_img" style="display:none;">
    <video id="hidden_video" loop playsinline style="display:none;"></video>

    <script src="app.js"></script>
</body>
</html>
