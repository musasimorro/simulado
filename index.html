<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vision HUD - Interface por Gestos</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- MediaPipe -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Background de fallback -->
    <div class="fallback-bg" id="fallback-bg"></div>
    
    <!-- Webcam e Canvas -->
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="hand-canvas"></canvas>
    <div class="overlay-fx"></div>

    <!-- Interface HUD -->
    <div class="hud-container">
        <!-- Menu lateral -->
        <div class="side-menu">
            <div class="menu-item" data-desktop="0">🏠</div>
            <div class="menu-item" data-desktop="1">📁</div>
            <div class="menu-item" data-desktop="2">🔍</div>
        </div>

        <!-- Áreas de trabalho -->
        <div class="desktop-container" id="desktop-container">
            <!-- Desktop Home -->
            <div class="desktop" data-desktop="0">
                <div class="home-widget">
                    <div class="clock" id="clock">--:--</div>
                    <div class="date" id="date"></div>
                </div>
                <div class="voice-search-container">
                    <div class="voice-btn" id="voice-btn">
                        <span>🎤</span>
                    </div>
                    <div class="search-result" id="search-result">Aponte ou toque para pesquisar</div>
                </div>
            </div>

            <!-- Desktop Arquivos -->
            <div class="desktop" data-desktop="1">
                <div class="files-grid" id="files-grid">
                    <div class="file-card empty-placeholder">
                        <span>📂</span>
                        <div class="file-name">Arraste arquivos ou use o botão abaixo</div>
                    </div>
                </div>
                <div class="upload-area">
                    <div class="voice-btn" id="upload-btn">
                        <span>📎</span>
                    </div>
                </div>
            </div>

            <!-- Desktop Pesquisa -->
            <div class="desktop" data-desktop="2">
                <div class="google-search-container">
                    <div class="google-logo">🔍 VISION SEARCH</div>
                    <input type="text" class="search-box" id="search-input" placeholder="Pesquise no Google...">
                    <div class="webview-container">
                        <iframe id="search-iframe" src="about:blank"></iframe>
                    </div>
                </div>
            </div>
        </div>

        <!-- Indicador de desktop -->
        <div class="desktop-indicator">
            <div class="indicator-dot active"></div>
            <div class="indicator-dot"></div>
            <div class="indicator-dot"></div>
        </div>

        <!-- Guia de gestos -->
        <div class="gesture-guide">
            🖐️ GESTOS: 👆 Indicador = Clique | ✌️ Pinça dupla = Zoom | 🤚 Deslizar = Trocar área
        </div>

        <!-- Status Bar -->
        <div class="status-bar" id="status-bar">🟢 INICIANDO...</div>

        <!-- Seletor de câmera -->
        <div class="camera-selector" id="camera-selector" style="display: none;">
            <select id="camera-select">
                <option value="">Carregando câmeras...</option>
            </select>
        </div>
    </div>

    <!-- Input de arquivos oculto -->
    <input type="file" id="file-input" accept="image/*,video/*" multiple style="display: none">

    <!-- JavaScript Modules -->
    <script src="js/desktop.js"></script>
    <script src="js/files.js"></script>
    <script src="js/camera.js"></script>
    <script src="js/gestures.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
