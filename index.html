<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>MR Spatial OS Fase 6</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

</head>

<body>

<div id="spatial-os-container">

    <!-- CAMERA -->
    <video
        id="webcam"
        autoplay
        playsinline>
    </video>

    <!-- CANVAS -->
    <canvas id="output_canvas"></canvas>

    <!-- RETÍCULO -->
    <div class="spatial-reticle">
        <div class="reticle-core"></div>
    </div>

    <!-- TOAST -->
    <div id="workspace-overlay-toast">
        WORKSPACE HOME
    </div>

    <!-- TOP PANEL -->
    <header class="hud-top-panel glass-card">

        <div id="os-status-indicator">
            SYSTEM ONLINE
        </div>

        <div class="hud-v-divider"></div>

        <button
            class="hud-btn"
            id="global-menu-btn">
            ☰
        </button>

        <button
            class="hud-btn"
            id="global-vr-btn">
            🥽
        </button>

        <button
            class="hud-btn"
            id="global-config-btn">
            ⚙
        </button>

    </header>

    <!-- WORKSPACE -->
    <main
        id="workspace-viewport"
        class="workspace-animate-fade">
    </main>

    <!-- VOLUME -->
    <aside
        class="hud-right-slider glass-card spatial-tilt-right"
        id="vertical-master-slider">

        <button class="slider-inc-btn">
            ＋
        </button>

        <div class="v-track">

            <div
                class="v-bar-fill"
                id="master-slider-fill"
                style="height:50%;">
            </div>

        </div>

        <button class="slider-dec-btn">
            －
        </button>

    </aside>

    <!-- DOCK -->
    <footer class="hud-bottom-dock glass-card">

        <button
            class="dock-btn-round"
            id="dock-back">
            ↩
        </button>

        <button
            class="dock-btn-round"
            id="dock-prev">
            ⏮
        </button>

        <button
            class="dock-btn-main"
            id="dock-center-action">

            <div class="main-core"></div>

        </button>

        <button
            class="dock-btn-round"
            id="dock-next">
            ⏭
        </button>

        <button
            class="dock-btn-round"
            id="dock-refresh">
            ↻
        </button>

    </footer>

</div>

<!-- FILE PICKER -->

<input
type="file"
id="system-file-picker"
accept="image/*,video/*,application/pdf"
multiple>

<audio
id="spatial-audio-node"
style="display:none;">
</audio>

<!-- APP -->

<script src="app.js"></script>

</body>
</html>
