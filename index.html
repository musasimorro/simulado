 <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR Hand Tracking Test</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            overflow: hidden;
            font-family: sans-serif;
        }
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        /* Vídeo original da câmera (escondido ou em background) */
        #webcam {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Espelha para parecer um espelho */
            z-index: 1;
        }
        /* Canvas onde desenhamos os pontos da mão */
        #output_canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 2;
        }
        /* Indicador de clique/gesto */
        #status {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            z-index: 3;
            font-weight: bold;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="container">
        <div id="status">Aguardando câmera...</div>
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusDiv = document.getElementById('status');

        // Ajusta o tamanho do canvas para o tamanho da tela
        function resizeCanvas() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Função para calcular a distância 3D entre dois pontos da mão
        function getDistance(p1, p2) {
            return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2) + Math.pow(p1.z - p2.z, 2));
        }

        // Resposta quando o MediaPipe encontra uma mão
        function onResults(results) {
            // Limpa o canvas anterior
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // Desenha a imagem da câmera no fundo do canvas (Efeito Pass-through/Realidade Mista)
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                statusDiv.innerText = "Mão detectada!";
                statusDiv.style.background = "rgba(0,0,0,0.7)";

                for (const landmarks of results.multiHandLandmarks) {
                    // Desenha os pontos e as linhas conectando os dedos
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
                    drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', lineWidth: 1, radius: 5});

                    // Lógica de Gesto: Ponto 4 é a ponta do polegar, Ponto 8 é a ponta do indicador
                    const thumbTip = landmarks[4];
                    const indexTip = landmarks[8];

                    const distance = getDistance(thumbTip, indexTip);

                    // Se a distância for muito curta, detecta como "Clique/Pinça"
                    if (distance < 0.05) {
                        statusDiv.innerText = "CLIQUE DETECTADO! 🫵";
                        statusDiv.style.background = "#00FF00";
                    }
                }
            } else {
                statusDiv.innerText = "Posicione sua mão na câmera";
            }
        }

        // Configuração do modelo do MediaPipe
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults(onResults);

        // Inicializa a câmera do dispositivo
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 1280,
            height: 720,
            facingMode: "environment" // "environment" foca na câmera traseira. Use "user" para a frontal.
        });
        
        camera.start().then(() => {
            statusDiv.innerText = "Posicione sua mão na câmera";
        }).catch(err => {
            statusDiv.innerText = "Erro ao abrir a câmera: " + err;
        });
    </script>
</body>
</html>
