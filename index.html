<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>MR Spatial OS | Mixed Reality Operating System</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#01040a">
    
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- MediaPipe Hands (CDN oficial) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        html, body { overflow: hidden; position: fixed; width: 100%; height: 100%; margin: 0; padding: 0; }
        
        .initial-loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #01040a;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 2px solid rgba(0,191,255,0.2);
            border-top-color: #00BFFF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .loading-text { color: #00BFFF; font-size: 14px; letter-spacing: 3px; font-weight: bold; text-align: center; }
        
        .camera-warning {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border: 1px solid #ff4444;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            z-index: 9998;
            font-size: 12px;
            color: #ff8888;
        }
    </style>
</head>
<body>

    <div class="initial-loading" id="initial-loading">
        <div style="text-align: center;">
            <div class="loading-spinner"></div>
            <div class="loading-text">MR SPATIAL OS</div>
            <div class="loading-text" style="font-size: 10px; margin-top: 10px;">Aguardando permissão da câmera...</div>
        </div>
    </div>

    <div id="spatial-os-container">
        <video id="webcam" autoplay playsinline style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1;"></video>
        <canvas id="output_canvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none;"></canvas>
        
        <div id="workspace-viewport" style="position: absolute; left: 50px; right: 140px; top: calc(max(80px, env(safe-area-inset-top)) + 90px); bottom: 120px; z-index: 10;"></div>
        
        <div class="spatial-reticle" style="position: absolute; top: 50%; left: 50%; width: 42px; height: 42px; transform: translate(-50%,-50%); border-radius: 50%; border: 1px dashed rgba(0,191,255,0.3); z-index: 5; display: flex; align-items: center; justify-content: center;">
            <div style="width: 5px; height: 5px; border-radius: 50%; background: #00BFFF; box-shadow: 0 0 12px #00BFFF;"></div>
        </div>
        
        <div id="workspace-overlay-toast" style="position: absolute; top: 45%; left: 50%; transform: translate(-50%,-50%); padding: 15px 40px; border-radius: 50px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(0,191,255,0.4); color: #00BFFF; letter-spacing: 3px; font-weight: bold; opacity: 0; z-index: 100; pointer-events: none; transition: opacity 0.3s;"></div>
        
        <!-- TOP HUD -->
        <div style="position: absolute; top: max(80px, env(safe-area-inset-top)); right: 40px; display: flex; align-items: center; gap: 18px; padding: 12px 24px; background: rgba(8,20,42,0.22); backdrop-filter: blur(20px); border: 1px solid rgba(0,191,255,0.35); border-radius: 24px; z-index: 50;">
            <div id="os-status-indicator" style="color: #00BFFF; font-size: 11px; letter-spacing: 2px; font-weight: 700;">MR SPATIAL OS</div>
            <div style="width: 1px; height: 18px; background: rgba(255,255,255,0.18);"></div>
            <button class="hud-btn" id="hud-home" style="background: transparent; border: none; color: white; font-size: 18px; cursor: pointer;">⌂</button>
            <button class="hud-btn" id="hud-mic" style="background: transparent; border: none; color: white; font-size: 18px; cursor: pointer;">🎙️</button>
        </div>
        
        <!-- BOTTOM DOCK -->
        <div style="position: absolute; left: 50%; bottom: max(35px, env(safe-area-inset-bottom)); transform: translateX(-50%); display: flex; align-items: center; gap: 18px; padding: 12px 34px; background: rgba(8,20,42,0.22); backdrop-filter: blur(20px); border: 1px solid rgba(0,191,255,0.35); border-radius: 24px; z-index: 50;">
            <button class="dock-btn" id="dock-prev" style="width: 46px; height: 46px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.04); color: white; cursor: pointer;">◀</button>
            <button class="dock-btn" id="dock-next" style="width: 46px; height: 46px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.04); color: white; cursor: pointer;">▶</button>
            <button class="dock-btn" id="dock-home" style="width: 46px; height: 46px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.04); color: white; cursor: pointer;">⌂</button>
            <button class="dock-main" id="dock-upload" style="width: 62px; height: 62px; border-radius: 50%; border: 2px solid #00BFFF; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center;">
                <div style="width: 42px; height: 42px; border-radius: 50%; background: white;"></div>
            </button>
        </div>
        
        <input type="file" id="system-file-picker" style="display: none;" accept="image/*,video/*,audio/*,.mp4,.mp3,.jpg,.png,.gif">
    </div>

    <script src="script.js"></script>
    
    <script>
        // Script de fallback para garantir que a câmera funcione no GitHub Pages
        (function() {
            // Esconder loading após carregar
            window.addEventListener('load', function() {
                setTimeout(function() {
                    const loading = document.getElementById('initial-loading');
                    if (loading) {
                        loading.style.opacity = '0';
                        setTimeout(function() { loading.style.display = 'none'; }, 500);
                    }
                }, 2000);
            });
            
            // Log para debug
            console.log('MR Spatial OS - Iniciado em:', window.location.href);
            console.log('HTTPS:', window.location.protocol === 'https:');
            
            // Verificar se está em HTTPS (GitHub Pages é HTTPS)
            if (window.location.protocol !== 'https:') {
                console.warn('AVISO: O MediaPipe funciona melhor em HTTPS');
            }
        })();
    </script>
</body>
</html>
