<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vision HUD - Interface por Gestos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', 'Orbitron', sans-serif;
            overflow: hidden;
            background: #000;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0;
            left: 0;
        }

        #webcam {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            /* SEM ESPELHAMENTO - imagem normal */
            transform: scaleX(1);
        }

        #hand-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .overlay-fx {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 60%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
            z-index: 2;
        }

        .hud-container {
            position: fixed;
            z-index: 10;
            width: 100%;
            height: 100%;
            pointer-events: none;
            top: 0;
            left: 0;
        }

        .desktop-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            transform: translateX(0%);
        }

        .desktop {
            min-width: 100%;
            height: 100%;
            padding: 80px 20px 120px 20px;
            overflow-y: auto;
        }

        .home-widget {
            background: rgba(12, 20, 35, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(0, 191, 255, 0.5);
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
        }

        .clock {
            font-size: 70px;
            font-family: 'Orbitron', monospace;
            color: #00BFFF;
            text-shadow: 0 0 20px #00BFFF;
            letter-spacing: 5px;
        }

        .date {
            font-size: 18px;
            color: #ccf4ff;
            margin-top: 10px;
        }

        .voice-search-container {
            background: rgba(12, 20, 35, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(0, 191, 255, 0.5);
            padding: 20px;
            margin-top: 20px;
        }

        .voice-btn {
            background: radial-gradient(circle at 30% 10%, #00BFFF, #0066aa);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.6);
            box-shadow: 0 0 20px #00BFFF;
            transition: 0.2s;
        }

        .voice-btn span {
            font-size: 40px;
        }

        .search-result {
            color: white;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            padding: 10px;
        }

        .file-card {
            background: rgba(12, 20, 35, 0.5);
            backdrop-filter: blur(20px);
            border-radius: 15px;
            border: 1px solid rgba(0, 191, 255, 0.4);
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .file-card.hand-hover {
            transform: scale(1.05);
            border-color: #00BFFF;
            box-shadow: 0 0 20px rgba(0,191,255,0.5);
        }

        .file-card span:first-child {
            font-size: 40px;
            display: block;
        }

        .file-card .file-name {
            font-size: 12px;
            color: #ccf4ff;
            margin-top: 8px;
        }

        .empty-placeholder {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            opacity: 0.7;
        }

        .google-search-container {
            background: rgba(12, 20, 35, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(0, 191, 255, 0.5);
            padding: 30px;
        }

        .google-logo {
            text-align: center;
            font-size: 30px;
            font-family: 'Orbitron', monospace;
            color: #00BFFF;
            margin-bottom: 20px;
        }

        .search-box {
            width: 100%;
            padding: 15px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #00BFFF;
            border-radius: 50px;
            color: white;
            font-size: 16px;
            text-align: center;
        }

        .webview-container {
            margin-top: 20px;
            height: 400px;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #00BFFF;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        .desktop-indicator {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 20;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 30px;
        }

        .indicator-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transition: all 0.3s;
        }

        .indicator-dot.active {
            background: #00BFFF;
            box-shadow: 0 0 10px #00BFFF;
            width: 20px;
            border-radius: 10px;
        }

        .side-menu {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 20;
        }

        .menu-item {
            width: 60px;
            height: 60px;
            background: rgba(12, 20, 35, 0.5);
            backdrop-filter: blur(20px);
            border-radius: 15px;
            border: 1px solid rgba(0, 191, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .menu-item.active {
            border-color: #00BFFF;
            box-shadow: 0 0 15px #00BFFF;
            background: rgba(0, 191, 255, 0.2);
        }

        .gesture-guide {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 10px;
            color: #00BFFF;
            font-family: 'Orbitron', monospace;
            z-index: 20;
            pointer-events: none;
        }

        .status-bar {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 11px;
            color: #00FF88;
            font-family: 'Orbitron', monospace;
            z-index: 20;
            pointer-events: none;
        }

        .upload-area {
            text-align: center;
            margin-top: 20px;
        }

        @media (max-width: 700px) {
            .clock { font-size: 45px; }
            .menu-item { width: 50px; height: 50px; font-size: 24px; }
        }
    </style>
</head>
<body>

    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="hand-canvas"></canvas>
    <div class="overlay-fx"></div>

    <div class="hud-container">
        <div class="side-menu">
            <div class="menu-item" data-desktop="0">🏠</div>
            <div class="menu-item" data-desktop="1">📁</div>
            <div class="menu-item" data-desktop="2">🔍</div>
        </div>

        <div class="desktop-container" id="desktop-container">
            <div class="desktop" data-desktop="0">
                <div class="home-widget">
                    <div class="clock" id="clock">--:--</div>
                    <div class="date" id="date"></div>
                </div>
                <div class="voice-search-container">
                    <div class="voice-btn" id="voice-btn">
                        <span>🎤</span>
                    </div>
                    <div class="search-result" id="search-result">Aponte ou toque para pesquisar</div>
                </div>
            </div>

            <div class="desktop" data-desktop="1">
                <div class="files-grid" id="files-grid">
                    <div class="file-card empty-placeholder">
                        <span>📂</span>
                        <div class="file-name">Arraste arquivos ou use o botão abaixo</div>
                    </div>
                </div>
                <div class="upload-area">
                    <div class="voice-btn" id="upload-btn" style="width:60px; height:60px; display:inline-flex;">
                        <span>📎</span>
                    </div>
                </div>
            </div>

            <div class="desktop" data-desktop="2">
                <div class="google-search-container">
                    <div class="google-logo">🔍 VISION SEARCH</div>
                    <input type="text" class="search-box" id="search-input" placeholder="Pesquise no Google...">
                    <div class="webview-container">
                        <iframe id="search-iframe" src="about:blank"></iframe>
                    </div>
                </div>
            </div>
        </div>

        <div class="desktop-indicator">
            <div class="indicator-dot active"></div>
            <div class="indicator-dot"></div>
            <div class="indicator-dot"></div>
        </div>

        <div class="gesture-guide">
            🖐️ GESTOS: 👆 Indicador (apontar) = Clique | 🤚 Deslizar RÁPIDO = Trocar área
        </div>

        <div class="status-bar" id="status-bar">🟢 INICIANDO...</div>
    </div>

    <input type="file" id="file-input" accept="image/*,video/*" multiple style="display: none">

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    
    <script>
        // ========== VARIÁVEIS GLOBAIS ==========
        let currentDesktop = 0;
        let mediaElements = [];
        let currentStream = null;
        let hands = null;
        let cameraProcessor = null;
        
        // Variáveis para swipe
        let handPositionHistory = [];
        let lastSwipeTime = 0;
        const SWIPE_COOLDOWN = 800;
        const SWIPE_THRESHOLD = 0.08;
        
        // Variáveis para clique
        let hoverStartTime = null;
        let currentHoverElement = null;
        const CLICK_HOLD_TIME = 400;

        // Elementos
        const desktopContainer = document.getElementById('desktop-container');
        const handCanvas = document.getElementById('hand-canvas');
        const ctx = handCanvas.getContext('2d');
        const videoElement = document.getElementById('webcam');
        const filesGrid = document.getElementById('files-grid');
        const fileInput = document.getElementById('file-input');
        const statusBar = document.getElementById('status-bar');
        const searchInput = document.getElementById('search-input');
        const searchIframe = document.getElementById('search-iframe');
        const voiceBtn = document.getElementById('voice-btn');
        const searchResult = document.getElementById('search-result');

        function updateStatus(msg) {
            if (statusBar) statusBar.textContent = msg;
            console.log(msg);
        }

        // ========== RELÓGIO ==========
        function updateClock() {
            const now = new Date();
            const clockEl = document.getElementById('clock');
            const dateEl = document.getElementById('date');
            if (clockEl) clockEl.textContent = now.toLocaleTimeString('pt-BR');
            if (dateEl) dateEl.textContent = now.toLocaleDateString('pt-BR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ========== TROCAR ÁREA ==========
        function switchDesktop(index) {
            if (index < 0) index = 0;
            if (index > 2) index = 2;
            if (currentDesktop === index) return;
            
            currentDesktop = index;
            desktopContainer.style.transform = `translateX(-${currentDesktop * 100}%)`;
            
            document.querySelectorAll('.indicator-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === currentDesktop);
            });
            document.querySelectorAll('.menu-item').forEach((item, i) => {
                item.classList.toggle('active', i === currentDesktop);
            });
            
            updateStatus(`📱 Área ${currentDesktop === 0 ? 'Home' : currentDesktop === 1 ? 'Arquivos' : 'Pesquisa'}`);
        }

        document.querySelectorAll('.menu-item').forEach((item, idx) => {
            item.addEventListener('click', () => switchDesktop(idx));
        });

        // ========== ARQUIVOS ==========
        function addFileToDesktop(file) {
            const url = URL.createObjectURL(file);
            const fileCard = document.createElement('div');
            fileCard.className = 'file-card';
            
            let icon = '📄';
            if (file.type.startsWith('image/')) icon = '🖼️';
            else if (file.type.startsWith('video/')) icon = '🎬';
            
            fileCard.innerHTML = `<span>${icon}</span><div class="file-name">${file.name.substring(0, 20)}</div>`;
            fileCard.onclick = () => {
                if (file.type.startsWith('image/')) window.open(url, '_blank');
                else if (file.type.startsWith('video/')) {
                    const win = window.open();
                    win.document.write(`<video src="${url}" controls autoplay style="width:100%;height:100%"></video>`);
                }
            };
            
            const placeholder = filesGrid.querySelector('.empty-placeholder');
            if (placeholder && filesGrid.children.length === 1) filesGrid.removeChild(placeholder);
            filesGrid.appendChild(fileCard);
            mediaElements.push(fileCard);
        }

        document.getElementById('upload-btn')?.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            Array.from(e.target.files).forEach(f => addFileToDesktop(f));
            fileInput.value = '';
        });

        window.addEventListener('dragover', e => e.preventDefault());
        window.addEventListener('drop', e => {
            e.preventDefault();
            Array.from(e.dataTransfer.files).forEach(f => addFileToDesktop(f));
        });

        // ========== PESQUISA VOZ ==========
        let recognition = null;
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'pt-BR';
            recognition.onresult = (e) => {
                const query = e.results[0][0].transcript;
                if (searchResult) searchResult.textContent = `🔍 "${query}"`;
                if (searchInput) searchInput.value = query;
                if (searchIframe) searchIframe.src = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
            };
        }

        voiceBtn?.addEventListener('click', () => {
            if (recognition) {
                searchResult.textContent = '🎤 Ouvindo...';
                recognition.start();
            } else {
                searchResult.textContent = '❌ Voz não suportada';
            }
        });

        searchInput?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && searchIframe) {
                searchIframe.src = `https://www.google.com/search?q=${encodeURIComponent(searchInput.value)}`;
            }
        });

        // ========== CÂMARA (SEM ESPELHAMENTO) ==========
        async function startCamera() {
            updateStatus('📷 Solicitando câmera...');
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user' }
                });
                
                currentStream = stream;
                videoElement.srcObject = stream;
                videoElement.style.display = 'block';
                // IMPORTANTE: SEM transformação de espelho
                videoElement.style.transform = 'scaleX(1)';
                await videoElement.play();
                
                updateStatus('📸 Câmera Frontal ATIVA | Aponte o dedo');
                initMediaPipe();
                
            } catch (err) {
                console.error('Erro na câmera:', err);
                updateStatus('❌ Erro na câmera: ' + err.name);
                videoElement.style.display = 'none';
            }
        }

        // ========== DETECÇÃO DE SWIPE ==========
        function detectSwipe(currentX) {
            handPositionHistory.push({ x: currentX, time: Date.now() });
            
            while (handPositionHistory.length > 0 && Date.now() - handPositionHistory[0].time > 500) {
                handPositionHistory.shift();
            }
            
            if (handPositionHistory.length < 5) return;
            
            const startX = handPositionHistory[0].x;
            const endX = handPositionHistory[handPositionHistory.length - 1].x;
            const deltaX = endX - startX;
            const timeSpan = handPositionHistory[handPositionHistory.length - 1].time - handPositionHistory[0].time;
            
            const isFastSwipe = timeSpan < 300;
            const isLongSwipe = Math.abs(deltaX) > SWIPE_THRESHOLD;
            
            if (isFastSwipe && isLongSwipe && (Date.now() - lastSwipeTime) > SWIPE_COOLDOWN) {
                if (deltaX > 0) {
                    switchDesktop(currentDesktop - 1);
                } else {
                    switchDesktop(currentDesktop + 1);
                }
                lastSwipeTime = Date.now();
                handPositionHistory = [];
            }
        }

        // ========== DETECÇÃO DE CLIQUE ==========
        let lastIndexTipPosition = null;
        
        function detectClick(indexTipX, indexTipY, isIndexExtended) {
            if (!isIndexExtended) {
                if (currentHoverElement) {
                    currentHoverElement.classList.remove('hand-hover');
                    currentHoverElement = null;
                }
                hoverStartTime = null;
                lastIndexTipPosition = null;
                return;
            }
            
            if (lastIndexTipPosition) {
                const moved = Math.hypot(indexTipX - lastIndexTipPosition.x, indexTipY - lastIndexTipPosition.y);
                if (moved > 15) {
                    if (currentHoverElement) {
                        currentHoverElement.classList.remove('hand-hover');
                        currentHoverElement = null;
                    }
                    hoverStartTime = null;
                }
            }
            lastIndexTipPosition = { x: indexTipX, y: indexTipY };
            
            const clickableElements = document.querySelectorAll('.file-card, .menu-item, .voice-btn, #upload-btn');
            let elementUnderFinger = null;
            
            for (let el of clickableElements) {
                const rect = el.getBoundingClientRect();
                if (indexTipX >= rect.left && indexTipX <= rect.right && indexTipY >= rect.top && indexTipY <= rect.bottom) {
                    elementUnderFinger = el;
                    break;
                }
            }
            
            if (currentHoverElement !== elementUnderFinger) {
                if (currentHoverElement) {
                    currentHoverElement.classList.remove('hand-hover');
                }
                currentHoverElement = elementUnderFinger;
                hoverStartTime = elementUnderFinger ? Date.now() : null;
                if (currentHoverElement) {
                    currentHoverElement.classList.add('hand-hover');
                }
            }
            
            if (currentHoverElement && hoverStartTime && (Date.now() - hoverStartTime) > CLICK_HOLD_TIME) {
                currentHoverElement.click();
                currentHoverElement.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    if (currentHoverElement) currentHoverElement.style.transform = '';
                }, 100);
                
                hoverStartTime = null;
                currentHoverElement.classList.remove('hand-hover');
                currentHoverElement = null;
            }
        }

        // ========== MEDIAPIPE ==========
        function drawHand(landmarks) {
            if (!ctx) return;
            
            for (let i = 0; i < landmarks.length; i++) {
                const x = landmarks[i].x * handCanvas.width;
                const y = landmarks[i].y * handCanvas.height;
                ctx.beginPath();
                ctx.arc(x, y, 5, 0, 2 * Math.PI);
                ctx.fillStyle = '#00BFFF';
                ctx.fill();
            }
            
            const connections = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20]];
            ctx.beginPath();
            ctx.strokeStyle = '#00BFFF';
            ctx.lineWidth = 2;
            for (let conn of connections) {
                const p1 = landmarks[conn[0]];
                const p2 = landmarks[conn[1]];
                ctx.moveTo(p1.x * handCanvas.width, p1.y * handCanvas.height);
                ctx.lineTo(p2.x * handCanvas.width, p2.y * handCanvas.height);
                ctx.stroke();
            }
        }

        function onHandResults(results) {
            if (!ctx || !handCanvas) return;
            ctx.clearRect(0, 0, handCanvas.width, handCanvas.height);
            
            if (handCanvas.width !== window.innerWidth || handCanvas.height !== window.innerHeight) {
                handCanvas.width = window.innerWidth;
                handCanvas.height = window.innerHeight;
            }
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                drawHand(landmarks);
                
                const palmX = landmarks[0].x;
                detectSwipe(palmX);
                
                const indexTip = landmarks[8];
                const indexMcp = landmarks[5];
                const isIndexExtended = indexTip.y < indexMcp.y;
                const tipX = indexTip.x * window.innerWidth;
                const tipY = indexTip.y * window.innerHeight;
                
                detectClick(tipX, tipY, isIndexExtended);
            } else {
                if (currentHoverElement) {
                    currentHoverElement.classList.remove('hand-hover');
                    currentHoverElement = null;
                }
                hoverStartTime = null;
                handPositionHistory = [];
            }
        }

        function initMediaPipe() {
            if (!videoElement.srcObject) return;
            
            hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });
            
            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.6,
                minTrackingConfidence: 0.6
            });
            
            hands.onResults(onHandResults);
            
            cameraProcessor = new Camera(videoElement, {
                onFrame: async () => {
                    if (hands && videoElement.srcObject) {
                        await hands.send({ image: videoElement });
                    }
                },
                width: 640,
                height: 480
            });
            cameraProcessor.start();
        }

        // ========== INICIALIZAR ==========
        function init() {
            updateStatus('🟢 INICIANDO...');
            startCamera();
            
            window.addEventListener('resize', () => {
                if (handCanvas) {
                    handCanvas.width = window.innerWidth;
                    handCanvas.height = window.innerHeight;
                }
            });
            
            handCanvas.width = window.innerWidth;
            handCanvas.height = window.innerHeight;
        }

        init();
        console.log('🚀 HUD Iniciado! Imagem sem espelhamento - gestos corretos!');
    </script>
</body>
</html>
