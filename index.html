<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MR Spatial OS v3</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="spatial-os-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>

        <div id="workspace-overlay-toast">SISTEMA INICIALIZADO</div>

        <main id="workspace-viewport" class="workspace-animate-fade">
            </main>

        <footer class="hud-bottom-dock glass-card">
            <button class="dock-btn-round" onclick="navigateWorkspace(-1)">⏮</button>
            <button class="dock-btn-main" onclick="loadWorkspace('home')"><div class="main-core"></div></button>
            <button class="dock-btn-round" onclick="navigateWorkspace(1)">⏭</button>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
