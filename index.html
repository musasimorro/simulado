<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR MR Media Suite - Lixeira</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            overflow: hidden;
            font-family: sans-serif;
            user-select: none;
        }
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        #webcam {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            opacity: 0;
        }
        #output_canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 2;
        }
        #status {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #00FF00;
            padding: 10px 20px;
            border-radius: 20px;
            z-index: 3;
            font-weight: bold;
            border: 1px solid #00FF00;
        }
        #file_label {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #007bff;
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            z-index: 4;
            font-weight: bold;
            cursor: pointer;
        }
        #file_input { display: none; }
    </style>
</head>
<body>

    <div id="container">
        <div id="status">Aguardando câmera...</div>
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
        
        <label id="file_label" for="file_input">Carregar Mídia 📂</label>
        <input type="file" id="file_input" accept="image/*,video/*">
    </div>

    <img id="hidden_img" style="display:none;">
    <video id="hidden_video" loop playsinline style="display:none;"></video>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusDiv = document.getElementById('status');
        const fileInput = document.getElementById('file_input');
        
        const hiddenImg = document.getElementById('hidden_img');
        const hiddenVideo = document.getElementById('hidden_video');

        let mediaType = null;
        let mediaX = 200;
        let mediaY = 200;
        let mediaScale = 0.5;
        let isDragging = false;
        let overTrash = false; // Indica se a mídia está em cima da lixeira
        
        let lastActionTime = 0;
        let buttons = [];
        let trashBtn = {}; // Objeto da lixeira virtual

        function updateElementPositions() {
            const w = canvasElement.width;
            const h = canvasElement.height;
            
            // Botões de controle de mídia e zoom
            buttons = [
                { id: 'play', label: 'PLAY/PAUSE', x: w/2 - 160, y: h - 120, w: 100, h: 50, active: false },
                { id: 'vup', label: 'VOL +', x: w/2 - 50, y: h - 120, w: 90, h: 50, active: false },
                { id: 'vdown', label: 'VOL -', x: w/2 + 50, y: h - 120, w: 90, h: 50, active: false },
                { id: 'zout', label: 'ZOOM -', x: w - 120, y: 80, w: 90, h: 50, active: false },
                { id: 'zin', label: 'ZOOM +', x: w - 120, y: 20, w: 90, h: 50, active: false }
            ];

            // Configuração da Lixeira Virtual (Canto inferior esquerdo)
            trashBtn = { x: 60, y: h - 130, radius: 40, active: false };
        }

        function resizeCanvas() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
            updateElementPositions();
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const fileURL = URL.createObjectURL(file);
            
            if (file.type.startsWith('video/')) {
                mediaType = 'video';
                hiddenImg.src = "";
                hiddenVideo.src = fileURL;
                hiddenVideo.play();
                hiddenVideo.volume = 0.5;
            } else {
                mediaType = 'image';
                hiddenVideo.pause();
                hiddenVideo.src = "";
                hiddenImg.src = fileURL;
            }
            mediaX = canvasElement.width / 4;
            mediaY = canvasElement.height / 4;
        });

        function getDistance(p1, p2) {
            return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
        }

        function drawInterface() {
            // Desenha os botões superiores/inferiores de controle
            buttons.forEach(btn => {
                if (mediaType === 'image' && (btn.id === 'play' || btn.id === 'vup' || btn.id === 'vdown')) return;
                if (!mediaType) return;

                canvasCtx.fillStyle = btn.active ? 'rgba(0, 255, 0, 0.8)' : 'rgba(0, 0, 0, 0.75)';
                canvasCtx.strokeStyle = '#00FF00';
                canvasCtx.lineWidth = 2;
                
                canvasCtx.beginPath();
                canvasCtx.roundRect(btn.x, btn.y, btn.w, btn.h, 8);
                canvasCtx.fill();
                canvasCtx.stroke();

                canvasCtx.fillStyle = btn.active ? '#000000' : '#FFFFFF';
                canvasCtx.font = 'bold 14px sans-serif';
                canvasCtx.textAlign = 'center';
                canvasCtx.textBaseline = 'middle';
                canvasCtx.fillText(btn.label, btn.x + btn.w/2, btn.y + btn.h/2);
            });

            // Desenha a Lixeira Holográfica (Sempre visível se houver mídia carregada)
            if (mediaType) {
                canvasCtx.save();
                canvasCtx.beginPath();
                canvasCtx.arc(trashBtn.x, trashBtn.y, trashBtn.radius, 0, 2 * Math.PI);
                
                // Pisca em vermelho forte se a imagem estiver em cima dela
                if (overTrash) {
                    canvasCtx.fillStyle = 'rgba(255, 0, 0, 0.85)';
                    canvasCtx.strokeStyle = '#FF0000';
                    canvasCtx.lineWidth = 4;
                } else {
                    canvasCtx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                    canvasCtx.strokeStyle = '#FF3333';
                    canvasCtx.lineWidth = 2;
                }
                canvasCtx.fill();
                canvasCtx.stroke();

                // Desenha o ícone Emoji de lixeira no meio do círculo
                canvasCtx.fillStyle = '#FFFFFF';
                canvasCtx.font = '30px sans-serif';
                canvasCtx.textAlign = 'center';
                canvasCtx.textBaseline = 'middle';
                canvasCtx.fillText('🗑️', trashBtn.x, trashBtn.y);
                canvasCtx.restore();
            }
        }

        function onResults(results) {
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            buttons.forEach(b => b.active = false);
            overTrash = false;

            // Renderiza a Mídia Flutuante
            let displayW = 0, displayH = 0;
            if (mediaType) {
                let currentMediaElement = mediaType === 'image' ? hiddenImg : hiddenVideo;
                
                displayW = currentMediaElement.videoWidth || currentMediaElement.width || 400;
                displayH = currentMediaElement.videoHeight || currentMediaElement.height || 300;
                
                const baseFactor = (canvasElement.width * 0.5) / displayW;
                displayW = displayW * baseFactor * mediaScale;
                displayH = displayH * baseFactor * mediaScale;

                // Lógica de colisão da mídia com a lixeira: verifica se o centro da imagem entrou no raio da lixeira
                let mediaCenterX = mediaX + (displayW / 2);
                let mediaCenterY = mediaY + (displayH / 2);
                let distToTrash = Math.sqrt(Math.pow(mediaCenterX - trashBtn.x, 2) + Math.pow(mediaCenterY - trashBtn.y, 2));
                
                if (distToTrash < trashBtn.radius + 30) {
                    overTrash = true;
                }

                canvasCtx.save();
                canvasCtx.globalAlpha = 0.75;
                canvasCtx.drawImage(currentMediaElement, mediaX, mediaY, displayW, displayH);
                
                if (isDragging) {
                    // SE ESTIVER EM CIMA DA LIXEIRA, BORDA FICA VERMELHA. CASO CONTRÁRIO, VERDE.
                    canvasCtx.strokeStyle = overTrash ? '#FF0000' : '#00FF00';
                    canvasCtx.lineWidth = overTrash ? 5 : 3;
                    canvasCtx.strokeRect(mediaX, mediaY, displayW, displayH);
                }
                canvasCtx.restore();
            }

            // Processamento das Mãos
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                statusDiv.innerText = "Modo MR Ativo";
                const landmarks = results.multiHandLandmarks[0];

                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 3});
                drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', lineWidth: 1, radius: 4});

                const thumbTip = landmarks[4];
                const indexTip = landmarks[8];

                const idxX = indexTip.x * canvasElement.width;
                const idxY = indexTip.y * canvasElement.height;

                const isPinching = getDistance(thumbTip, indexTip) < 0.06;
                const now = Date.now();

                if (isPinching) {
                    let hitButton = false;

                    buttons.forEach(btn => {
                        if (mediaType === 'image' && (btn.id === 'play' || btn.id === 'vup' || btn.id === 'vdown')) return;
                        if (idxX >= btn.x && idxX <= btn.x + btn.w && idxY >= btn.y && idxY <= btn.y + btn.h) {
                            btn.active = true;
                            hitButton = true;

                            if (now - lastActionTime > 600) {
                                if (btn.id === 'play') {
                                    if (hiddenVideo.paused) hiddenVideo.play(); else hiddenVideo.pause();
                                } else if (btn.id === 'vup') {
                                    hiddenVideo.volume = Math.min(1, hiddenVideo.volume + 0.1);
                                } else if (btn.id === 'vdown') {
                                    hiddenVideo.volume = Math.max(0, hiddenVideo.volume - 0.1);
                                } else if (btn.id === 'zin') {
                                    mediaScale = Math.min(2.0, mediaScale + 0.1);
                                } else if (btn.id === 'zout') {
                                    mediaScale = Math.max(0.2, mediaScale - 0.1);
                                }
                                lastActionTime = now;
                            }
                        }
                    });

                    if (!hitButton && mediaType) {
                        isDragging = true;
                        mediaX = idxX - (displayW / 2);
                        mediaY = idxY - (displayH / 2);
                    }

                } else {
                    // SE SOLTAR O GESTO DE PINÇA ENQUANTO ESTIVER EM CIMA DA LIXEIRA, DELETA A MÍDIA
                    if (isDragging && overTrash) {
                        mediaType = null;
                        hiddenVideo.pause();
                        hiddenVideo.src = "";
                        hiddenImg.src = "";
                    }
                    isDragging = false;
                }
            } else {
                statusDiv.innerText = "Posicione a mão na câmera";
                isDragging = false;
            }

            drawInterface();
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.55,
            minTrackingConfidence: 0.55
        });

        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 1280,
            height: 720,
            facingMode: "environment"
        });
        camera.start();
    </script>
</body>
</html>
